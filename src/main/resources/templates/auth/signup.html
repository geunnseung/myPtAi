<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>회원가입 | My PT AI</title>
    <link rel="stylesheet" th:href="@{/css/app.css(v=login)}">
</head>
<body>
<header class="app-header">
    <div class="app-header__inner">
        <a class="brand" th:href="@{/login}">My PT AI</a>
        <nav class="nav" aria-label="인증 메뉴">
            <a th:href="@{/login}">로그인</a>
            <a th:href="@{/signup}" aria-current="page">회원가입</a>
        </nav>
    </div>
</header>

<main class="auth-page">
    <section class="panel auth-panel">
        <div class="page-title">
            <h1>회원가입</h1>
            <p>계정을 만들고 첫 목표를 설정합니다.</p>
        </div>

        <form th:action="@{/signup}" th:object="${form}" method="post" novalidate>
            <div class="form-grid form-grid--single">
                <div class="field">
                    <label for="email">이메일</label>
                    <input id="email" type="email" th:field="*{email}" autocomplete="username" placeholder="you@example.com">
                    <div class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                </div>

                <div class="field">
                    <label for="password">비밀번호</label>
                    <input id="password" type="password" th:field="*{password}" autocomplete="new-password">
                    <div class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                </div>

                <div class="field">
                    <label for="displayName">이름</label>
                    <input id="displayName" type="text" th:field="*{displayName}" placeholder="예: 민수">
                    <div class="field-error" th:if="${#fields.hasErrors('displayName')}" th:errors="*{displayName}"></div>
                </div>

                <div class="field">
                    <label for="goal">목표</label>
                    <select id="goal" th:field="*{goal}">
                        <option th:each="goalType : ${goalTypes}"
                                th:value="${goalType}"
                                th:text="${goalType.label}">
                        </option>
                    </select>
                    <div class="field-error" th:if="${#fields.hasErrors('goal')}" th:errors="*{goal}"></div>
                </div>
            </div>

            <div class="form-actions form-actions--between">
                <button class="button" type="submit">회원가입</button>
                <a class="text-link" th:href="@{/login}">로그인</a>
            </div>
        </form>
    </section>
</main>
</body>
</html>
