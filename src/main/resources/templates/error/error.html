<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('오류 | My PT AI')}"></head>
<body>
<header th:replace="~{fragments/layout :: simpleHeader}"></header>

<main class="error-page">
    <section class="panel error-panel">
        <p class="error-code" th:text="${status ?: '오류'}">오류</p>
        <div class="page-title">
            <h1>오류가 발생했습니다.</h1>
            <p>요청을 다시 확인해 주세요.</p>
        </div>
        <div class="form-actions">
            <a class="button" th:href="@{/}">홈으로 이동</a>
            <a class="button button--secondary" th:href="@{/login}">로그인</a>
        </div>
    </section>
</main>
</body>
</html>
