<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>페이지를 찾을 수 없습니다 | My PT AI</title>
    <link rel="stylesheet" th:href="@{/css/app.css(v=error)}">
</head>
<body>
<header class="app-header">
    <div class="app-header__inner">
        <a class="brand" th:href="@{/}">My PT AI</a>
    </div>
</header>

<main class="error-page">
    <section class="panel error-panel">
        <p class="error-code">404</p>
        <div class="page-title">
            <h1>페이지를 찾을 수 없습니다.</h1>
            <p>주소가 바뀌었거나 더 이상 제공하지 않는 페이지입니다.</p>
        </div>
        <div class="form-actions">
            <a class="button" th:href="@{/}">홈으로 이동</a>
            <a class="button button--secondary" th:href="@{/login}">로그인</a>
        </div>
    </section>
</main>
</body>
</html>
