spring:
  application:
    name: my-pt-ai
  profiles:
    active: local

server:
  port: 8080

openai:
  base-url: https://api.openai.com/v1
  model: gpt-5.5
  api-key: ${OPENAI_API_KEY:}
  connect-timeout: 3s
  read-timeout: 30s

myptai:
  time-zone: Asia/Seoul

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health
