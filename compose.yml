services:
  app:
    build: .
    image: my-pt-ai:local
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      MYSQL_URL: "jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=${MYPTAI_TIME_ZONE:-Asia/Seoul}&characterEncoding=UTF-8"
      MYSQL_USERNAME: "${MYSQL_USER}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD}"
      MYPTAI_TIME_ZONE: "${MYPTAI_TIME_ZONE:-Asia/Seoul}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-https://api.openai.com/v1}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-5.5}"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      OPENAI_CONNECT_TIMEOUT: "${OPENAI_CONNECT_TIMEOUT:-3s}"
      OPENAI_READ_TIMEOUT: "${OPENAI_READ_TIMEOUT:-30s}"
      JAVA_OPTS: "${JAVA_OPTS:-}"
      TZ: "${MYPTAI_TIME_ZONE:-Asia/Seoul}"
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_DATABASE: "${MYSQL_DATABASE}"
      MYSQL_USER: "${MYSQL_USER}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD}"
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      TZ: "${MYPTAI_TIME_ZONE:-Asia/Seoul}"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  mysql-data:
